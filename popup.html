<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 360px; padding: 15px; font-family: system-ui, sans-serif; }
    label { display: block; margin: 12px 0 6px; font-weight: bold; }
    input, select, textarea { 
      width: 100%; 
      padding: 8px; 
      box-sizing: border-box; 
      font-size: 14px; 
    }
    textarea { height: 60px; resize: vertical; }
    button { margin: 15px 8px 0 0; padding: 10px 16px; font-size: 14px; }
    .status { 
      margin-top: 15px; 
      padding: 12px; 
      border-radius: 6px; 
      font-size: 14px; 
      line-height: 1.5;
    }
    .enabled  { background: #d4edda; color: #155724; }
    .disabled { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <h2>Proxy 设置器</h2>

  <label>协议类型</label>
  <select id="scheme">
    <option value="socks5">SOCKS5</option>
    <option value="http">HTTP / HTTPS</option>
  </select>

  <label>代理地址 (Host)</label>
  <input type="text" id="host" placeholder="192.168.100.1 或 proxy.example.com">

  <label>端口 (Port)</label>
  <input type="number" id="port" placeholder="7896">

  <label>节点备注（方便识别）</label>
  <textarea id="note" placeholder="这是翻墙节点"></textarea>

  <div>
    <button id="save">保存并启用</button>
    <button id="disable">禁用代理</button>
  </div>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
